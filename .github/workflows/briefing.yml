name: Generate Briefing

on:
  # Run Mon & Thu at 08:30 CET (07:30 UTC in winter, 06:30 UTC in summer)
  # Using 07:30 UTC — covers CET (UTC+1) winter time; swap to 06:30 in summer
  schedule:
    - cron: '30 7 * * 1,4'   # Monday and Thursday 07:30 UTC

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    name: Generate & Publish Briefing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-briefing.mjs

      - name: Commit & push new post
        run: |
          git config user.name "Craig's Newsroom Bot"
          git config user.email "bot@craigs-newsroom.local"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "Nothing to commit (duplicate check passed, no new post)"
          else
            git commit -m "briefing: $(date +%Y-%m-%d)"
            git push
          fi
