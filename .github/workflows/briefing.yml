name: Generate Briefing

on:
  # Run Mon & Thu at 08:30 CEST (06:30 UTC in summer, UTC+2)
  # Europe clocks move to CEST (UTC+2) late March — 06:30 UTC = 08:30 CEST
  schedule:
    - cron: '30 6 * * 1,4'   # Monday and Thursday 06:30 UTC (= 08:30 CEST)

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  briefing:
    name: Generate & Publish Briefing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-briefing.mjs

      - name: Commit & push new post
        id: commit
        run: |
          git config user.name "Craig's Newsroom Bot"
          git config user.email "bot@craigs-newsroom.local"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "Nothing to commit (duplicate check passed, no new post)"
            echo "new_post=false" >> $GITHUB_OUTPUT
          else
            git commit -m "briefing: $(date +%Y-%m-%d)"
            git push
            echo "new_post=true" >> $GITHUB_OUTPUT
            echo "post_date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Notify — post commit comment
        if: steps.commit.outputs.new_post == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const date = '${{ steps.commit.outputs.post_date }}';
            const siteUrl = 'https://alexrobcraig-oss.github.io/personal-newsroom/';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: `✅ **Craig's Newsroom — Briefing Published**\n\n📅 **Date:** ${date}\n🌐 **Live at:** [${siteUrl}](${siteUrl})\n\nYour twice-weekly market briefing has been generated and deployed. The site will be live within ~1 minute of this comment.`
            });
